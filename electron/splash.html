<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VulnAssesTool</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%);
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .splash-container {
      text-align: center;
      padding: 40px;
    }

    .logo-container {
      margin-bottom: 24px;
      animation: pulse 2s ease-in-out infinite;
    }

    .logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
      box-shadow: 0 10px 40px rgba(59, 130, 246, 0.3);
    }

    .logo svg {
      width: 48px;
      height: 48px;
      fill: white;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.05);
      }
    }

    .app-name {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #ffffff 0%, #94a3b8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .app-tagline {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 32px;
    }

    .loading-container {
      width: 200px;
      margin: 0 auto;
    }

    .loading-bar {
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      overflow: hidden;
    }

    .loading-progress {
      height: 100%;
      background: linear-gradient(90deg, #3b82f6 0%, #60a5fa 100%);
      border-radius: 2px;
      animation: loading 1.5s ease-in-out infinite;
    }

    @keyframes loading {
      0% {
        width: 0%;
        margin-left: 0%;
      }
      50% {
        width: 70%;
        margin-left: 15%;
      }
      100% {
        width: 0%;
        margin-left: 100%;
      }
    }

    .loading-text {
      font-size: 12px;
      color: #64748b;
      margin-top: 12px;
    }

    .version {
      position: fixed;
      bottom: 20px;
      right: 20px;
      font-size: 11px;
      color: #475569;
    }
  </style>
</head>
<body>
  <div class="splash-container">
    <div class="logo-container">
      <div class="logo">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L3 7v10l9 5 9-5V7l-9-5zm0 2.18l6.9 3.82L12 11.82 5.1 8 12 4.18zM5 9.82l6 3.33V18.5l-6-3.33V9.82zm8 8.68v-5.35l6-3.33v5.35l-6 3.33z"/>
        </svg>
      </div>
    </div>

    <h1 class="app-name">VulnAssesTool</h1>
    <p class="app-tagline">Vulnerability Assessment Tool</p>

    <div class="loading-container">
      <div class="loading-bar">
        <div class="loading-progress"></div>
      </div>
      <p class="loading-text">Loading...</p>
    </div>
  </div>

  <div class="version">v2.0.0</div>
</body>
</html>
